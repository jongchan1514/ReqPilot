<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — 업무 관리 시스템</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-card { width:100%; max-width:380px; border-radius:16px; border:none; box-shadow:0 4px 24px rgba(0,0,0,.10); }
    .login-card .card-body { padding:2.5rem; }
    .login-logo { font-size:2rem; color:#3b82f6; }
  </style>
</head>
<body>
  <div class="card login-card">
    <div class="card-body">
      <div class="text-center mb-4">
        <div class="login-logo mb-2"><i class="bi bi-grid-3x3-gap-fill"></i></div>
        <h5 class="fw-bold mb-0">업무 관리 시스템</h5>
        <div class="text-muted small mt-1">업무 관리 기능 접근을 위해 로그인하세요</div>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2 small">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">비밀번호</label>
          <input type="password" name="password" class="form-control" autofocus
                 placeholder="관리자 비밀번호 입력">
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i> 로그인
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="/" class="text-muted small">요구사항 관리로 돌아가기 →</a>
      </div>
    </div>
  </div>
</body>
</html>
