<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}요구사항 관리{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet">
  <style>
    :root { --sidebar-w: 220px; --sidebar-bg: #1e293b; --accent: #3b82f6; }
    body { background: #f1f5f9; font-size: .9rem; }

    .sidebar {
      width: var(--sidebar-w); min-height: 100vh;
      background: var(--sidebar-bg); position: fixed; top: 0; left: 0;
      display: flex; flex-direction: column; z-index: 100;
    }
    .sidebar-brand {
      padding: 18px 16px; color: #fff; font-weight: 700; font-size: .95rem;
      border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 8px;
    }
    .sidebar .nav-link {
      color: #94a3b8; padding: 10px 16px;
      display: flex; align-items: center; gap: 9px;
      transition: background .15s, color .15s;
    }
    .sidebar .nav-link:hover  { color: #fff; background: #334155; }
    .sidebar .nav-link.active { color: #fff; background: var(--accent); }
    .sidebar-section {
      padding: 10px 16px 4px;
      font-size: .7rem; color: #475569; font-weight: 600;
      text-transform: uppercase; letter-spacing: .05em;
    }

    .main-content { margin-left: var(--sidebar-w); padding: 28px 32px; min-height: 100vh; }

    .card { border: none; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card-header { background: #fff; border-bottom: 1px solid #e2e8f0; font-weight: 600; border-radius: 12px 12px 0 0 !important; }

    .table thead th { background: #f8fafc; font-weight: 600; font-size: .82rem; color: #64748b; border-bottom: 2px solid #e2e8f0; }
    .table td { vertical-align: middle; }
    .table-hover tbody tr:hover { background: #f0f9ff; }

    .badge-신규    { background:#dbeafe; color:#1d4ed8; }
    .badge-수정필요 { background:#fef3c7; color:#92400e; }
    .badge-완료    { background:#dcfce7; color:#166534; }
    .badge-작업중  { background:#f3e8ff; color:#6b21a8; }
    .status-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.75rem; font-weight:600; }

    .req-tag { display:inline-block; background:#dbeafe; color:#1d4ed8; border-radius:4px; padding:1px 7px; font-size:.75rem; margin:1px; }
    .btn-icon { padding:3px 7px; font-size:.8rem; }
    .empty-state { text-align:center; padding:50px 20px; color:#94a3b8; }
    .toc-node { border-bottom:1px solid #f1f5f9; }
    .toc-node:last-child { border-bottom:none; }
    .toc-node-inner:hover { background:#f8fafc; }
    .toc-ghost { opacity:.4; background:#e0f2fe !important; }
    .toc-drag-handle:hover { color:#3b82f6 !important; }
    .section-drag-handle:hover { color:#3b82f6 !important; }
    .req-type-tag { display:inline-block; border-radius:4px; padding:1px 6px; font-size:.7rem; font-weight:600; margin-right:4px; vertical-align:middle; }
    .req-detail-row td { border-top:none !important; }
    .req-group-hdr:hover td { filter: brightness(.96); }
    .toc-section-hdr:hover { filter: brightness(.97); }
    .empty-state i { font-size:2.5rem; display:block; margin-bottom:10px; }
    .select2-container { width: 100% !important; }

    /* TOC filter bar */
    .toc-filter-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .toc-filter-group {
      display: flex; gap: 3px;
      background: #e2e8f0; border-radius: 8px; padding: 3px;
    }
    .toc-filter-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 11px; border-radius: 6px; border: none;
      background: transparent; color: #64748b;
      font-size: .78rem; font-weight: 500; cursor: pointer;
      transition: background .12s, color .12s, box-shadow .12s;
      white-space: nowrap; line-height: 1.6;
    }
    .toc-filter-btn:hover { background: rgba(255,255,255,.65); color: #1e293b; }
    .toc-filter-btn.active {
      background: #fff; color: #1e293b;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
    }
    .tfc-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      background: #cbd5e1;
    }
    .toc-filter-btn[data-filter="신규"]    .tfc-dot { background: #3b82f6; }
    .toc-filter-btn[data-filter="수정필요"] .tfc-dot { background: #f59e0b; }
    .toc-filter-btn[data-filter="작업중"]  .tfc-dot { background: #8b5cf6; }
    .toc-filter-btn[data-filter="완료"]    .tfc-dot { background: #22c55e; }
    .toc-filter-btn[data-filter="신규"].active    { color: #1d4ed8; }
    .toc-filter-btn[data-filter="수정필요"].active { color: #92400e; }
    .toc-filter-btn[data-filter="작업중"].active  { color: #5b21b6; }
    .toc-filter-btn[data-filter="완료"].active    { color: #166534; }
    .toc-filter-count-badge {
      margin-left: auto; font-size: .72rem; color: #64748b;
      background: #e2e8f0; padding: 1px 9px; border-radius: 10px;
      font-weight: 500; display: none;
    }
    .toc-filter-count-badge:not(:empty) { display: inline-block; }
    .toc-filtered .section-drag-handle,
    .toc-filtered .toc-drag-handle { visibility: hidden; }

    .project-card { cursor:pointer; transition:transform .15s,box-shadow .15s; }
    .project-card:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,.12); }

    /* PDF viewer panel */
    .pdf-viewer-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 45%; background: #fff; box-shadow: -4px 0 20px rgba(0,0,0,.15);
      z-index: 200; display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform .3s ease;
    }
    .pdf-viewer-panel.open { transform: translateX(0); }
    .pdf-viewer-panel .panel-header {
      padding: 12px 16px; border-bottom: 1px solid #e2e8f0;
      display: flex; justify-content: space-between; align-items: center;
      font-weight: 600; background: #f8fafc; flex-shrink: 0;
    }
    .pdf-viewer-panel iframe { flex: 1; border: none; }
    body.pdf-open .main-content { margin-right: 45%; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand">
    <i class="bi bi-grid-3x3-gap-fill"></i> 업무 관리 시스템
  </div>
  <nav class="nav flex-column mt-1">
    {% if is_local_user %}
    <div class="sidebar-section">업무 관리</div>
    <a class="nav-link {% if request.endpoint == 'todos_page' %}active{% endif %}" href="/todos">
      <i class="bi bi-check2-square"></i> 할일 목록
    </a>
    <a class="nav-link {% if request.endpoint == 'worklog_page' %}active{% endif %}" href="/worklog">
      <i class="bi bi-journal-text"></i> 작업일지
    </a>
    <a class="nav-link {% if request.endpoint == 'chat_page' %}active{% endif %}" href="/chat">
      <i class="bi bi-stars"></i> AI 어시스턴트
    </a>
    {% endif %}

    <div class="sidebar-section mt-2">요구사항 관리</div>
    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
      <i class="bi bi-folder2"></i> 프로젝트 목록
    </a>
    <a class="nav-link {% if request.endpoint == 'search_page' %}active{% endif %}" href="/search">
      <i class="bi bi-search"></i> 전체 검색
    </a>
    <a class="nav-link {% if request.endpoint == 'req_types_page' %}active{% endif %}" href="/settings/req-types">
      <i class="bi bi-tags"></i> 요구사항 타입
    </a>
    <a class="nav-link {% if request.endpoint == 'analyze_page' %}active{% endif %}" href="/analyze">
      <i class="bi bi-file-earmark-diff"></i> 제안서 분석
    </a>
    {% if project is defined and project %}
    <div class="sidebar-section mt-2">현재 프로젝트</div>
    <a class="nav-link {% if request.endpoint in ('project_detail', 'pdf_detail') %}active{% endif %}"
       href="/project/{{ project.id }}">
      <i class="bi bi-folder2-open"></i>
      <span class="text-truncate" style="max-width:140px">{{ project.name }}</span>
    </a>
    {% endif %}
  </nav>
</div>

<div class="main-content">
  {% block content %}{% endblock %}
</div>

<!-- PDF Viewer Panel -->
<div class="pdf-viewer-panel" id="pdfPanel">
  <div class="panel-header">
    <span id="pdfPanelTitle"><i class="bi bi-file-earmark-pdf me-2 text-danger"></i>PDF 원본</span>
    <button class="btn btn-sm btn-outline-secondary" onclick="closePdfPanel()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>
  <iframe id="pdfFrame" src="about:blank"></iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
function openPdfPanel(pdfId, name) {
  document.getElementById('pdfFrame').src = `/api/pdf/${pdfId}/file`;
  document.getElementById('pdfPanelTitle').innerHTML =
    `<i class="bi bi-file-earmark-pdf me-2 text-danger"></i>${name || 'PDF 원본'}`;
  document.getElementById('pdfPanel').classList.add('open');
  document.body.classList.add('pdf-open');
}
function closePdfPanel() {
  document.getElementById('pdfPanel').classList.remove('open');
  document.body.classList.remove('pdf-open');
  setTimeout(() => { document.getElementById('pdfFrame').src = 'about:blank'; }, 300);
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
